name: Backend Tests

on:
  push:
    branches: [main, develop]
    paths:
      - '.github/workflows/backend-tests.yml'
      - 'src/**'
      - '.mvn/**'
      - 'pom.xml'
      - 'mvnw'
      - 'Dockerfile'
  pull_request:
    branches: [main, develop]
    paths:
      - '.github/workflows/backend-tests.yml'
      - 'src/**'
      - '.mvn/**'
      - 'pom.xml'
      - 'mvnw'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw test -B